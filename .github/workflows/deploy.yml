# Triggering deployment with rm -f fix
name: Build and Deploy

on:
  push:
    branches: [ "release" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Replace Domain Placeholder
        run: |
          find skills -type f -name "*.md" -exec sed -i "s|__DOMAIN__|${{ secrets.APP_URL }}|g" {} +

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }} \
            --build-arg NEXTAUTH_URL=${{ secrets.APP_URL }} \
            --build-arg NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
            -t loricamaris-app:latest .
          docker save loricamaris-app:latest | gzip > loricamaris-app:latest.tar.gz


      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "loricamaris-app:latest.tar.gz,docker-compose.yml"
          target: "/app/loricamaris"

      - name: SSH and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NEXTAUTH_SECRET,NEXTAUTH_URL,NEXT_PUBLIC_APP_URL
          script: |
            cd /app/loricamaris
            export NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            export NEXTAUTH_URL=${{ secrets.APP_URL }}
            export NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}
            
            mkdir -p data/user-games
            chmod -R 777 data
            gunzip -c loricamaris-app:latest.tar.gz | docker load
            docker compose up -d

            rm -f loricamaris-app:latest.tar.gz
